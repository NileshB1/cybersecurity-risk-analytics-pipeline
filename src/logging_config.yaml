version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s | %(levelname)s | %(name)s | %(message)s'
  access:
    format: '%(asctime)s | %(levelname)s | %(message)s'
  uvicorn_simple:
    format: '%(asctime)s | %(levelname)s | %(message)s'

handlers:
  default:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

  access:
    class: logging.StreamHandler
    level: INFO
    formatter: access
    stream: ext://sys.stdout

  uvicorn_error:
    class: logging.StreamHandler
    level: INFO
    formatter: uvicorn_simple
    stream: ext://sys.stdout

loggers:
  uvicorn:
    handlers:
      - uvicorn_error
    level: INFO
    propagate: false

  uvicorn.access:
    handlers:
      - access
    level: WARNING
    propagate: false

root:
  level: INFO
  handlers:
    - default